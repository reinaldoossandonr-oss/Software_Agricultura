<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario | Axioma Flux</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f4f7f6; margin: 0; font-family: 'Segoe UI', sans-serif; }
        /* Header sincronizado con el index */
        header { background: white; padding: 15px 40px; display: flex; align-items: center; border-bottom: 1px solid #e0e0e0; gap: 40px; }
        .nav-container { display: flex; gap: 20px; align-items: center; flex-grow: 1; }
        .nav-item { cursor: pointer; color: #475569; text-decoration: none; font-weight: 500; }
        .nav-item.active { color: #1aabf0; }

        .grid-formularios { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 20px; }
        .form-card { flex: 1; min-width: 300px; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .form-card h4 { margin-top: 0; color: #1aabf0; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 10px; background: #1aabf0; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <img src="https://axiomaanalytics.com/wp-content/uploads/2026/06/Axioma_analyticis_logo_letras_blancas_verde-8.svg" style="width: 140px;">
        
        <nav class="nav-container">
            <a href="index.html" class="nav-item">Dashboard</a>
            <a href="inventario.html" class="nav-item active">Inventario</a>
        </nav>

        <button onclick="cerrarSesion()" style="background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer;">Salir</button>
    </header>

    <main style="padding: 40px; max-width: 1200px; margin: auto;">
        <h2 style="color: #333;">Gestión de Inventario</h2>

        <div class="grid-formularios">
            <div class="form-card">
                <h4>Recepción de Mercancía</h4>
                <form id="formRecepcion" onsubmit="registrarMovimiento(event, 'INGRESO')">
                    <input type="hidden" name="empresa_id" value="00000000-0000-0000-0000-000000000000">
                    <div class="form-group"><label>Producto ID</label><input type="text" name="producto_id" required></div>
                    <div class="form-group"><label>Ubicación</label><input type="text" name="ubicacion_id" required></div>
                    <div class="form-group"><label>Cantidad</label><input type="number" name="cantidad" step="0.01" required></div>
                    <button type="submit" class="btn-action">Confirmar Ingreso</button>
                </form>
            </div>

            <div class="form-card">
                <h4>Orden de Picking/Despacho</h4>
                <form id="formPicking" onsubmit="registrarMovimiento(event, 'SALIDA')">
                    <input type="hidden" name="empresa_id" value="00000000-0000-0000-0000-000000000000">
                    <div class="form-group"><label>Producto ID</label><input type="text" name="producto_id" required></div>
                    <div class="form-group"><label>Ubicación</label><input type="text" name="ubicacion_id" required></div>
                    <div class="form-group"><label>Cantidad</label><input type="number" name="cantidad" step="0.01" required></div>
                    <button type="submit" class="btn-action" style="background: #059669;">Procesar Salida</button>
                </form>
            </div>

            <div class="form-card">
                <h4>Ajuste de Inventario</h4>
                <form id="formAjuste" onsubmit="registrarMovimiento(event, 'AJUSTE')">
                    <input type="hidden" name="empresa_id" value="00000000-0000-0000-0000-000000000000">
                    <div class="form-group"><label>Producto ID</label><input type="text" name="producto_id" required></div>
                    <div class="form-group"><label>Ubicación</label><input type="text" name="ubicacion_id" required></div>
                    <div class="form-group"><label>Motivo</label>
                        <select name="motivo">
                            <option value="Merma">Merma</option>
                            <option value="Auditoría">Auditoría Física</option>
                            <option value="Error">Error de Sistema</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Cantidad (±)</label><input type="number" name="cantidad" step="0.01" required></div>
                    <button type="submit" class="btn-action" style="background: #f59e0b;">Aplicar Ajuste</button>
                </form>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
