<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axioma Flux | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <header>
        <img src="https://axiomaanalytics.com/wp-content/uploads/2026/06/Axioma_analyticis_logo_letras_blancas_verde-8.svg" style="width: 140px;">
        
        <nav class="nav-container">
            <a href="#" class="nav-item active" onclick="mostrarSeccion('dashboard', this)">Dashboard</a>
            <a href="#" class="nav-item" onclick="mostrarSeccion('inventario', this)">Inventario</a>
            <a href="#" class="nav-item" onclick="mostrarSeccion('movimientos', this)">Movimientos</a>
        </nav>

        <button onclick="cerrarSesion()">Salir</button>
    </header>

    <main>
        <div id="seccion-dashboard">
            <div class="card">
                <canvas id="graficoStock" style="max-height: 300px;"></canvas>
            </div>
        </div>

        <div id="seccion-inventario" class="hidden">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3>Inventario en Tiempo Real</h3>
                    <input type="text" id="buscadorInventario" placeholder="Buscar producto..." onkeyup="filtrarInventario()">
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>SKU</th>
                            <th>Stock Real</th>
                            <th>Consumo</th>
                            <th>Días</th>
                            <th>Estado</th>
                            <th>Reponer</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTablaInventario"></tbody>
                </table>
            </div>
        </div>

        <div id="seccion-movimientos" class="hidden">
            <div class="card">
                <h3>Registrar Entrada</h3>
                <form onsubmit="registrarMovimiento(event, 'ENTRADA')">
                    <input type="text" name="sku" placeholder="SKU" required>
                    <input type="number" name="cantidad" placeholder="Cantidad" required>
                    <button type="submit">Registrar Entrada</button>
                </form>
            </div>
            <div class="card">
                <h3>Registrar Salida</h3>
                <form onsubmit="registrarMovimiento(event, 'SALIDA')">
                    <input type="text" name="sku" placeholder="SKU" required>
                    <input type="number" name="cantidad" placeholder="Cantidad" required>
                    <button type="submit">Registrar Salida</button>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
