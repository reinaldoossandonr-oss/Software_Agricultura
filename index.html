<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axioma Flux | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f7f6; margin: 0; font-family: 'Segoe UI', sans-serif; }
        header { background: white; padding: 15px 40px; display: flex; align-items: center; border-bottom: 1px solid #e0e0e0; gap: 40px; }
        .nav-container { display: flex; gap: 20px; align-items: center; flex-grow: 1; }
        .nav-item { cursor: pointer; color: #475569; text-decoration: none; font-weight: 500; }
        .nav-item.active { color: #1aabf0; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 30px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; max-width: 300px; }
        .hidden { display: none; }
        /* Nuevo estilo para KPIs */
        .kpi-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    </style>
</head>
<body>

    <header>
        <img src="https://axiomaanalytics.com/wp-content/uploads/2026/06/Axioma_analyticis_logo_letras_blancas_verde-8.svg" style="width: 140px;">
        <nav class="nav-container">
            <a href="index.html" class="nav-item active">Dashboard</a>
            <a href="inventario.html" class="nav-item">Inventario</a>
        </nav>
        <button onclick="cerrarSesion()" style="background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer;">Salir</button>
    </header>

    <main style="padding: 40px; max-width: 1200px; margin: auto;">
        <div id="seccion-dashboard">
            <h2 style="color: #333;">Dashboard de Logística</h2>
            
            <div class="kpi-container">
                <div class="card" style="text-align: center; margin-bottom: 0;">
                    <div style="color: #64748b; font-size: 11px; text-transform: uppercase; font-weight: bold;">Productos Óptimos</div>
                    <div id="kpi-optimo" style="font-size: 28px; font-weight: bold; color: #10b981; margin-top: 10px;">0</div>
                </div>
                <div class="card" style="text-align: center; margin-bottom: 0;">
                    <div style="color: #64748b; font-size: 11px; text-transform: uppercase; font-weight: bold;">A Reponer</div>
                    <div id="kpi-reponer" style="font-size: 28px; font-weight: bold; color: #ef4444; margin-top: 10px;">0</div>
                </div>
                <div class="card" style="text-align: center; margin-bottom: 0;">
                    <div style="color: #64748b; font-size: 11px; text-transform: uppercase; font-weight: bold;">Total SKUs</div>
                    <div id="kpi-total" style="font-size: 28px; font-weight: bold; color: #333; margin-top: 10px;">0</div>
                </div>
            </div>

            <div style="display: flex; gap: 20px; margin-top: 30px;">
                <div class="card" style="flex: 1;"><canvas id="graficoStock" style="max-height: 300px;"></canvas></div>
                <div class="card" style="flex: 1;"><canvas id="graficoVentas" style="max-height: 300px;"></canvas></div>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3 style="margin:0;">Inventario en Tiempo Real</h3>
                    <input type="text" id="buscadorInventario" placeholder="Buscar producto..." onkeyup="filtrarInventario()">
                </div>
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="text-align: left; color: #666; border-bottom: 2px solid #f1f5f9;">
                            <th style="padding: 12px;">Nombre</th>
                            <th style="padding: 12px;">SKU</th>
                            <th style="padding: 12px;">Stock Real</th>
                            <th style="padding: 12px;">Consumo</th>
                            <th style="padding: 12px;">Días</th>
                            <th style="padding: 12px;">Estado</th>
                            <th style="padding: 12px;">Reponer</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTablaInventario"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
