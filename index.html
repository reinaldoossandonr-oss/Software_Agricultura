<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axioma Flux | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <script>
        // Verificación de sesión
        window.addEventListener('load', () => {
            if (typeof clienteSupabase !== 'undefined') {
                clienteSupabase.auth.getSession().then(({ data }) => {
                    if (!data.session) window.location.href = 'login.html';
                });
            }
        });
    </script>

    <div class="dashboard-container">
        <div class="sidebar">
            <img src="https://axiomaanalytics.com/wp-content/uploads/2026/06/Axioma_analyticis_logo_letras_blancas_verde-8.svg" style="width:160px; margin: 0 auto; display: block;">
            <div style="margin-top: 30px;">
                <div class="nav-item active" onclick="window.mostrarSeccion('dashboard', this)">📊 Dashboard</div>
                <div class="nav-item" onclick="window.mostrarSeccion('inventario', this)">📦 Inventario</div>
                <div class="nav-item" onclick="cerrarSesion()">🚪 Salir</div>
            </div>
        </div>
        
        <div class="main-content">
            <div id="seccion-dashboard">
                <h2>Dashboard de Logística</h2>
                <div style="height: 350px; background: white; padding: 20px; border-radius: 12px; margin-top: 20px;">
                    <canvas id="graficoStock"></canvas>
                </div>
            </div>

            <div id="seccion-inventario" class="hidden">
                <h2>Control de Inventario</h2>
                <input type="text" id="buscadorInventario" placeholder="Buscar por SKU, nombre o categoría..." onkeyup="filtrarInventario()" style="width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ccc;">
                
                <table id="tablaInventario" style="width: 100%; margin-top: 20px; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden;">
                    <thead>
                        <tr style="background-color: #f8f9fa; border-bottom: 2px solid #eee;">
                            <th style="text-align: left; padding: 15px;">SKU</th>
                            <th style="text-align: left; padding: 15px;">Nombre</th>
                            <th style="text-align: left; padding: 15px;">Categoría</th>
                            <th style="text-align: left; padding: 15px;">Stock</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTablaInventario"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
