<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axioma Analytics Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <script>
        // Nota: No definimos SUPABASE_URL ni KEYS aquí para evitar conflictos con script.js
        // Suponemos que script.js ya inicializó clienteSupabase
        // Esperamos un poco a que cargue script.js para verificar la sesión
        window.addEventListener('load', () => {
            if (typeof clienteSupabase !== 'undefined') {
                clienteSupabase.auth.getSession().then(({ data }) => {
                    if (!data.session) {
                        window.location.href = 'login.html';
                    }
                });
            }
        });
    </script>

    <div class="dashboard-container">
        <div class="sidebar">
            <img src="https://axiomaanalytics.com/wp-content/uploads/2026/06/Axioma_analyticis_logo_letras_blancas_verde-8.svg" style="width:160px; margin: 0 auto; display: block;">
            <div style="margin-top: 30px;">
                <div class="nav-item active" onclick="window.mostrarSeccion('dashboard', this)">📊 Dashboard</div>
                <div class="nav-item" onclick="window.mostrarSeccion('dotacion', this)">👥 Dotación</div>
                <div class="nav-item" onclick="clienteSupabase.auth.signOut().then(() => window.location.href='login.html')">🚪 Salir</div>
            </div>
        </div>
        
        <div class="main-content">
            <div id="seccion-dashboard">
                <h2>Dashboard</h2>
                <div class="kpi-container">
                    <div class="kpi-card"><h3>Eficiencia</h3><div style="font-size: 24px;">11.35</div></div>
                </div>
                <div style="height: 300px; background: white; padding: 20px; border-radius: 12px;">
                    <canvas id="graficoRendimiento"></canvas>
                </div>
            </div>

            <div id="seccion-dotacion" class="hidden">
                <h2>Dotación</h2>
                </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
