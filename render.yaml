# ============================================================
# render.yaml — Configuración de deploy en Render
# Axioma Flux — Backend FastAPI
# ============================================================
# Render lee este archivo al conectar el repositorio.
# Las variables marcadas con sync: false se ingresan
# manualmente en el dashboard de Render.
# ============================================================

services:
  - type: web
    name: axioma-flux-api
    env: python
    region: oregon          # elegir la más cercana a tus usuarios
    plan: free              # cambiar a 'starter' en producción real
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true        # se redeploya automáticamente al hacer push a main

    envVars:
      - key: SUPABASE_URL
        sync: false         # ingresar manualmente en Render dashboard
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false         # ingresar la URL de Vercel después del deploy
      - key: ENVIRONMENT
        value: production
